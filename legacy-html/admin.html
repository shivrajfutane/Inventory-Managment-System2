        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');

</script>

        <main class="main-content">

                    <button onclick="openMobileSidebar()" class="lg:hidden btn btn-ghost p-2" style="color: var(--text-secondary);"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>

                        <h2 style="font-size: 1.125rem; font-weight: 600; color: var(--text-primary);">Super Admin Panel</h2>
                        <p style="font-size: 0.75rem; color: var(--text-tertiary);">Manage system users and roles</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">

                    <div class="relative">

                            <div style="padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-light);"><p class="text-sm font-semibold" data-user-name>User</p></div>
                            <a href="settings.html" class="dropdown-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>Settings</a>

            <div class="content-area page-fade-in">
                <div class="page-header">
                    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
                        <div>
                            <h1>User Management</h1>
                            <p>Manage user roles and permissions</p>
                        </div>
                        <div class="text-sm" style="color: var(--text-tertiary);">
                            Total: <span id="totalCount" class="font-semibold" style="color: var(--text-primary);">0</span> users
                        </div>
                    </div>
                </div>

                <!-- Users Table -->
                <div class="app-card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="data-table w-full">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Phone</th>
                                    <th>Role</th>
                                    <th>Joined At</th>
                                    <th style="text-align: right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <!-- Loading state -->
                                <tr><td colspan="5"><div class="skeleton" style="height: 200px; border-radius: 0;"></div></td></tr>
                            </tbody>
                        </table>
                    </div>

    <div class="toast-container"></div>

    <script type="module">
        import { supabase, getCurrentUser } from './js/supabase.js';
        import { requireAuth, requireAdmin, logout, displayUserInfo } from './js/auth.js';
        import { initAnimations } from './js/animations.js';

        // Check authentication AND admin role
        const isAdmin = await requireAdmin();
        if (!isAdmin) {
            // Stop execution if not admin
            throw new Error('Not authorized');
        }

        await displayUserInfo();
        initAnimations();
        setPageTitle('Super Admin Panel');
        document.getElementById('logoutBtn').addEventListener('click', logout);

        // State
        let allUsers = [];

        // Fetch users
        async function fetchUsers() {
            try {
                // Since profiles is viewable by authenticated users (via RLS), we can fetch all of them.
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allUsers = data || [];
                document.getElementById('totalCount').textContent = allUsers.length;
                renderTable(allUsers);
            } catch (error) {
                console.error('Error fetching users:', error);
                showToast('Error loading users', 'error');
            }
        }

        // Render table
        function renderTable(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8">No users found.</td></tr>';
                return;
            }

            tbody.innerHTML = users.map((user, index) => {
                const roleColors = {
                    admin: { bg: 'var(--color-danger-light)', text: 'var(--color-danger)' },
                    manager: { bg: 'var(--color-warning-light)', text: 'var(--color-warning)' },
                    user: { bg: 'var(--color-info-light)', text: 'var(--color-info)' }
                };
                const rc = roleColors[user.role] || roleColors.user;

                return `
                    <tr class="table-row-hover" style="animation: cardStagger 0.3s ease-out ${index * 0.05}s both;">
                        <td>
                            <div class="flex items-center gap-3">
                                <div class="img-container" style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--color-primary-500), var(--color-primary-700)); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">
                                    ${user.full_name ? user.full_name.charAt(0).toUpperCase() : 'U'}
                                </div>
                                <div class="min-w-0">
                                    <p class="font-medium text-sm truncate" style="color: var(--text-primary);">${escapeHtml(user.full_name || 'Unknown')}</p>
                                </div>
                            </div>
                        </td>
                        <td class="text-sm" style="color: var(--text-tertiary);">${escapeHtml(user.phone || 'N/A')}</td>
                        <td>
                            <span class="inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full" style="background: ${rc.bg}; color: ${rc.text};">
                                ${capitalizeWords(user.role || 'user')}
                            </span>
                        </td>
                        <td class="text-sm" style="color: var(--text-tertiary);">${formatDate(user.created_at)}</td>
                        <td>
                            <div class="flex items-center justify-end gap-2">
                                <button onclick="editRole('${user.id}', '${escapeHtml(user.full_name || 'User')}', '${user.role}')" class="btn btn-outline btn-sm">
                                    Edit Role
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.editRole = function(userId, userName, currentRole) {
            showModal({
                title: 'Edit User Role',
                size: 'sm',
                content: `
                    <div class="form-group mb-4">
                        <label class="form-label text-sm text-gray-600 mb-2 block">Updating role for: <strong>${userName}</strong></label>
                        <select id="newRoleSelect" class="form-select w-full">
                            <option value="user" ${currentRole === 'user' ? 'selected' : ''}>User</option>
                            <option value="manager" ${currentRole === 'manager' ? 'selected' : ''}>Manager</option>
                            <option value="admin" ${currentRole === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    </div>
                `,
                confirmText: 'Save Changes',
                confirmClass: 'btn-primary',
                onConfirm: async () => {
                    const newRole = document.getElementById('newRoleSelect').value;
                    if (newRole === currentRole) {
                        closeModal();
                        return;
                    }

                    try {
                        const { error } = await supabase
                            .from('profiles')
                            .update({ role: newRole })
                            .eq('id', userId);
                        
                        if (error) throw error;
                        
                        showToast('Role updated successfully', 'success');
                        closeModal();
                        await fetchUsers(); // refresh table
                    } catch (error) {
                        console.error('Error updating role:', error);
                        showToast('Error updating role: ' + error.message, 'error');
                    }
                }
            });
        };

        // Initialize
        await fetchUsers();
    </script>
    <script type="module" src="js/app.js"></script>
</body>
